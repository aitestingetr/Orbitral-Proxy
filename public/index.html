<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Orbitral</title>

    <link rel="shortcut icon" href="favicon.webp" />

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />

    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
  </head>

  <body>
    <div class="evr-root">
      <!-- Browser chrome bar -->
      <div class="evr-chrome">
        <div class="chrome-left">
          <button class="chrome-btn" aria-hidden="true"></button>
          <button class="chrome-btn" aria-hidden="true"></button>
          <button class="chrome-btn" aria-hidden="true"></button>
        </div>
        <div class="chrome-omnibox">
          <span class="chrome-lock"></span>
          <span id="chrome-omnibox-text" class="chrome-text">Orbitral Proxy • Powered by Scramjet</span>
        </div>
        <div class="chrome-right">
          <span class="chrome-dot"></span>
        </div>
      </div>

      <!-- Tab bar -->
      <div class="evr-tabs">
        <div class="tab-list">
          <div id="tab-new" class="tab active" data-tab="new" title="New Tab">
            <span class="tab-label">New Tab</span>
            <button class="tab-close" aria-label="Close" tabindex="-1">×</button>
          </div>
          <button class="tab-add" aria-label="New tab">+</button>
        </div>
      </div>

      <!-- Viewport: new tab content OR proxy frame -->
      <div class="evr-viewport">
        <main id="evr-newtab" class="evr-main">
          <section class="evr-center">
            <div class="evr-time-row">
              <div id="evr-clock" class="evr-clock">--:--</div>
              <div class="evr-battery" aria-label="Battery">
                <div class="evr-battery-shell">
                  <div
                    id="evr-battery-fill"
                    class="evr-battery-fill battery-green"
                  ></div>
                </div>
                <div class="evr-battery-cap"></div>
                <span id="evr-battery-text" class="evr-battery-text">--%</span>
                <span id="evr-battery-charging" class="evr-battery-charging"></span>
              </div>
            </div>

            <form id="sj-form" class="evr-search-card">
              <input
                id="sj-search-engine"
                value="https://www.google.com/search?q=%s"
                type="hidden"
              />
              <div class="evr-search-inner">
                <span class="evr-search-icon"></span>
                <input
                  id="sj-address"
                  type="text"
                  placeholder="Search or enter a site URL"
                  autocomplete="off"
                />
              </div>
            </form>

            <p class="evr-hint">
              Orbitral Proxy 
            </p>

            <div class="evr-status">
              <p id="sj-error" class="status-error"></p>
              <pre id="sj-error-code" class="status-code"></pre>
            </div>
          </section>

          <footer class="evr-footer">
            <span>Orbitral Proxy &mdash; powered by Scramjet </span>
          </footer>
        </main>

        <div id="evr-frame-wrap" class="evr-frame-wrap" style="display: none;">
          <!-- Scramjet frame injected here -->
        </div>
      </div>
    </div>
  </body>
</html>
